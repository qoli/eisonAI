<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eisonAI</title>
  <link rel="stylesheet" href="./popup.css" />
</head>

<body>
  <header class="header">
    <div class="row">
      <div class="flexCenter">
        <strong>eisonAI</strong>
      </div>
      <div class="block"></div>
      <span id="backend-badge" class="link">Backend: --</span>
    </div>
  </header>

  <div class="output-title-bar row">
    <div class="output-title flex1">Cognitive Index</div>
    <button id="summarize" class="popup-button" type="button">Summarize Tab</button>
    <button id="share" class="popup-button secondary" type="button">Copy</button>
  </div>

  <div id="output" class="output">Ready.</div>

  <div class="token-footer row">
    <div id="status" class="status">Idle</div>
    <span id="availability" class="webgpu-status">Loading…</span>
  </div>

  <script src="./marked.umd.js"></script>
  <script type="module" src="./popup.js"></script>
</body>

</html>
